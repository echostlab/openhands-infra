name: Deploy OpenHands (new VPC + Route53)

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region principal para el despliegue"
        required: true
        default: "us-east-1"
        type: string
      domain_name:
        description: "Dominio para Route 53 y OpenHands (ej. echosmart.me)"
        required: true
        default: "echosmart.me"
        type: string
      sub_domain:
        description: "Subdominio de OpenHands"
        required: true
        default: "openhands"
        type: string
      node_version:
        description: "Versión de Node.js"
        required: true
        default: "22.19.0"
        type: string
      role_to_assume:
        description: "ARN del rol IAM a asumir (OIDC). Déjalo vacío si usarás access keys"
        required: false
        default: ""
        type: string
      vpc_cidr:
        description: "CIDR de la nueva VPC"
        required: true
        default: "10.42.0.0/16"
        type: string
      public_subnet_a_cidr:
        description: "CIDR subnet pública A"
        required: true
        default: "10.42.0.0/24"
        type: string
      public_subnet_b_cidr:
        description: "CIDR subnet pública B"
        required: true
        default: "10.42.1.0/24"
        type: string
      private_subnet_a_cidr:
        description: "CIDR subnet privada A"
        required: true
        default: "10.42.10.0/24"
        type: string
      private_subnet_b_cidr:
        description: "CIDR subnet privada B"
        required: true
        default: "10.42.11.0/24"
        type: string
      auth_callback_domains:
        description: "OAuth callback domains (JSON array o coma-separado)"
        required: false
        default: '["openhands.echosmart.me"]'
        type: string
      auth_domain_prefix_suffix:
        description: "Sufijo del dominio Cognito"
        required: false
        default: "shared"
        type: string
      edge_stack_suffix:
        description: "Sufijo para Edge stack"
        required: false
        default: "shared"
        type: string
      sandbox_aws_access:
        description: "Habilitar acceso AWS en sandbox"
        required: false
        default: false
        type: boolean
      sandbox_aws_policy_file:
        description: "Ruta de policy JSON para sandbox"
        required: false
        default: "config/sandbox-aws-policy.json"
        type: string
      skip_s3_endpoint:
        description: "Saltar endpoint S3 (si ya existe en VPC)"
        required: false
        default: false
        type: boolean
      force_delete:
        description: "Eliminar y recrear VPC/Hosted Zone existentes"
        required: false
        default: false
        type: boolean
      warm_pool_size:
        description: "Cantidad de sandboxes pre-calentados"
        required: false
        default: "2"
        type: string
      idle_timeout_minutes:
        description: "Timeout idle sandbox (minutos)"
        required: false
        default: "30"
        type: string
      sandbox_soci_image_uri:
        description: "URI de imagen SOCI v2 opcional"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      DOMAIN_NAME: ${{ inputs.domain_name }}
      SUB_DOMAIN: ${{ inputs.sub_domain }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install awscli jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Install awscli
        id: install-aws-cli
        uses: unfor19/install-aws-cli-action@v1
        with:
          version: 2
          verbose: false
          arch: amd64

      - name: Configure AWS credentials (OIDC)
        if: ${{ inputs.role_to_assume != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Configure AWS credentials (Access Keys)
        if: ${{ inputs.role_to_assume == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Verify toolchain
        run: |
          aws --version
          docker --version
          node --version
          npm --version
          npx --version
          uv --version

      - name: Install project dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm install
          npm install --no-save aws-cdk ts-node typescript @types/node source-map-support
          npm ci
          npm run build
          


      - name: Resolve or create network (VPC + NAT)
        id: network
        shell: bash
        run: |
          set -euo pipefail

          FORCE_DELETE='${{ inputs.force_delete }}'

          is_empty_text() {
            local value="${1:-}"
            [[ -z "$value" || "$value" == "None" || "$value" == "null" ]]
          }

          get_vpc_id() {
            aws ec2 describe-vpcs \
              --region "$AWS_REGION" \
              --filters Name=tag:Name,Values=openhands-vpc \
              --query 'Vpcs[0].VpcId' \
              --output text
          }

          get_subnet_id() {
            local subnet_name="$1"
            aws ec2 describe-subnets \
              --region "$AWS_REGION" \
              --filters Name=tag:Name,Values="$subnet_name" Name=vpc-id,Values="$VPC_ID" \
              --query 'Subnets[0].SubnetId' \
              --output text
          }

          delete_existing_network() {
            local existing_vpc_id="$1"

            echo "force_delete=true: deleting VPC resources for $existing_vpc_id"

            NAT_IDS=$(aws ec2 describe-nat-gateways \
              --region "$AWS_REGION" \
              --filter Name=vpc-id,Values="$existing_vpc_id" Name=state,Values=available,pending,failed \
              --query 'NatGateways[].NatGatewayId' \
              --output text)

            if ! is_empty_text "$NAT_IDS"; then
              for nat_id in $NAT_IDS; do
                aws ec2 delete-nat-gateway --region "$AWS_REGION" --nat-gateway-id "$nat_id" || true
              done

              for nat_id in $NAT_IDS; do
                for _ in {1..60}; do
                  nat_state=$(aws ec2 describe-nat-gateways \
                    --region "$AWS_REGION" \
                    --nat-gateway-ids "$nat_id" \
                    --query 'NatGateways[0].State' \
                    --output text 2>/dev/null || echo "deleted")
                  if [[ "$nat_state" == "deleted" || "$nat_state" == "None" || "$nat_state" == "null" ]]; then
                    break
                  fi
                  sleep 10
                done
              done
            fi

            EIP_ALLOCATIONS=$(aws ec2 describe-addresses \
              --region "$AWS_REGION" \
              --filters Name=tag:Name,Values=openhands-nat-eip \
              --query 'Addresses[].AllocationId' \
              --output text)

            if ! is_empty_text "$EIP_ALLOCATIONS"; then
              for allocation_id in $EIP_ALLOCATIONS; do
                aws ec2 release-address --region "$AWS_REGION" --allocation-id "$allocation_id" || true
              done
            fi

            ROUTE_TABLE_IDS=$(aws ec2 describe-route-tables \
              --region "$AWS_REGION" \
              --filters Name=vpc-id,Values="$existing_vpc_id" \
              --query 'RouteTables[?Associations[?Main!=`true`]].RouteTableId' \
              --output text)

            if ! is_empty_text "$ROUTE_TABLE_IDS"; then
              for route_table_id in $ROUTE_TABLE_IDS; do
                ASSOCIATION_IDS=$(aws ec2 describe-route-tables \
                  --region "$AWS_REGION" \
                  --route-table-ids "$route_table_id" \
                  --query 'RouteTables[0].Associations[?Main!=`true`].RouteTableAssociationId' \
                  --output text)

                if ! is_empty_text "$ASSOCIATION_IDS"; then
                  for association_id in $ASSOCIATION_IDS; do
                    aws ec2 disassociate-route-table --region "$AWS_REGION" --association-id "$association_id" || true
                  done
                fi

                aws ec2 delete-route-table --region "$AWS_REGION" --route-table-id "$route_table_id" || true
              done
            fi

            SUBNET_IDS=$(aws ec2 describe-subnets \
              --region "$AWS_REGION" \
              --filters Name=vpc-id,Values="$existing_vpc_id" Name=tag:Name,Values=openhands-public-a,openhands-public-b,openhands-private-a,openhands-private-b \
              --query 'Subnets[].SubnetId' \
              --output text)

            if ! is_empty_text "$SUBNET_IDS"; then
              for subnet_id in $SUBNET_IDS; do
                aws ec2 delete-subnet --region "$AWS_REGION" --subnet-id "$subnet_id" || true
              done
            fi

            IGW_IDS=$(aws ec2 describe-internet-gateways \
              --region "$AWS_REGION" \
              --filters Name=attachment.vpc-id,Values="$existing_vpc_id" Name=tag:Name,Values=openhands-igw \
              --query 'InternetGateways[].InternetGatewayId' \
              --output text)

            if ! is_empty_text "$IGW_IDS"; then
              for igw_id in $IGW_IDS; do
                aws ec2 detach-internet-gateway --region "$AWS_REGION" --internet-gateway-id "$igw_id" --vpc-id "$existing_vpc_id" || true
                aws ec2 delete-internet-gateway --region "$AWS_REGION" --internet-gateway-id "$igw_id" || true
              done
            fi

            aws ec2 delete-vpc --region "$AWS_REGION" --vpc-id "$existing_vpc_id" || true
          }

          VPC_ID=$(get_vpc_id)

          if [[ "$FORCE_DELETE" == "true" ]] && ! is_empty_text "$VPC_ID"; then
            delete_existing_network "$VPC_ID"
            VPC_ID=""
          fi

          if is_empty_text "$VPC_ID"; then
            echo "No reusable VPC found, creating network resources"

            AZ1=$(aws ec2 describe-availability-zones --region "$AWS_REGION" --query 'AvailabilityZones[0].ZoneName' --output text)
            AZ2=$(aws ec2 describe-availability-zones --region "$AWS_REGION" --query 'AvailabilityZones[1].ZoneName' --output text)

            VPC_ID=$(aws ec2 create-vpc \
              --region "$AWS_REGION" \
              --cidr-block '${{ inputs.vpc_cidr }}' \
              --tag-specifications 'ResourceType=vpc,Tags=[{Key=Name,Value=openhands-vpc}]' \
              --query 'Vpc.VpcId' --output text)

            aws ec2 wait vpc-available --region "$AWS_REGION" --vpc-ids "$VPC_ID"
            aws ec2 modify-vpc-attribute --region "$AWS_REGION" --vpc-id "$VPC_ID" --enable-dns-support '{"Value":true}'
            aws ec2 modify-vpc-attribute --region "$AWS_REGION" --vpc-id "$VPC_ID" --enable-dns-hostnames '{"Value":true}'

            IGW_ID=$(aws ec2 create-internet-gateway \
              --region "$AWS_REGION" \
              --tag-specifications 'ResourceType=internet-gateway,Tags=[{Key=Name,Value=openhands-igw}]' \
              --query 'InternetGateway.InternetGatewayId' --output text)
            aws ec2 attach-internet-gateway --region "$AWS_REGION" --vpc-id "$VPC_ID" --internet-gateway-id "$IGW_ID"

            PUBLIC_SUBNET_A=$(aws ec2 create-subnet \
              --region "$AWS_REGION" \
              --vpc-id "$VPC_ID" \
              --cidr-block '${{ inputs.public_subnet_a_cidr }}' \
              --availability-zone "$AZ1" \
              --tag-specifications 'ResourceType=subnet,Tags=[{Key=Name,Value=openhands-public-a}]' \
              --query 'Subnet.SubnetId' --output text)

            PUBLIC_SUBNET_B=$(aws ec2 create-subnet \
              --region "$AWS_REGION" \
              --vpc-id "$VPC_ID" \
              --cidr-block '${{ inputs.public_subnet_b_cidr }}' \
              --availability-zone "$AZ2" \
              --tag-specifications 'ResourceType=subnet,Tags=[{Key=Name,Value=openhands-public-b}]' \
              --query 'Subnet.SubnetId' --output text)

            PRIVATE_SUBNET_A=$(aws ec2 create-subnet \
              --region "$AWS_REGION" \
              --vpc-id "$VPC_ID" \
              --cidr-block '${{ inputs.private_subnet_a_cidr }}' \
              --availability-zone "$AZ1" \
              --tag-specifications 'ResourceType=subnet,Tags=[{Key=Name,Value=openhands-private-a}]' \
              --query 'Subnet.SubnetId' --output text)

            PRIVATE_SUBNET_B=$(aws ec2 create-subnet \
              --region "$AWS_REGION" \
              --vpc-id "$VPC_ID" \
              --cidr-block '${{ inputs.private_subnet_b_cidr }}' \
              --availability-zone "$AZ2" \
              --tag-specifications 'ResourceType=subnet,Tags=[{Key=Name,Value=openhands-private-b}]' \
              --query 'Subnet.SubnetId' --output text)

            aws ec2 modify-subnet-attribute --region "$AWS_REGION" --subnet-id "$PUBLIC_SUBNET_A" --map-public-ip-on-launch
            aws ec2 modify-subnet-attribute --region "$AWS_REGION" --subnet-id "$PUBLIC_SUBNET_B" --map-public-ip-on-launch

            PUBLIC_RT=$(aws ec2 create-route-table \
              --region "$AWS_REGION" \
              --vpc-id "$VPC_ID" \
              --tag-specifications 'ResourceType=route-table,Tags=[{Key=Name,Value=openhands-public-rt}]' \
              --query 'RouteTable.RouteTableId' --output text)

            aws ec2 create-route --region "$AWS_REGION" --route-table-id "$PUBLIC_RT" --destination-cidr-block 0.0.0.0/0 --gateway-id "$IGW_ID"
            aws ec2 associate-route-table --region "$AWS_REGION" --route-table-id "$PUBLIC_RT" --subnet-id "$PUBLIC_SUBNET_A"
            aws ec2 associate-route-table --region "$AWS_REGION" --route-table-id "$PUBLIC_RT" --subnet-id "$PUBLIC_SUBNET_B"

            EIP_ALLOC_ID=$(aws ec2 allocate-address \
              --region "$AWS_REGION" \
              --domain vpc \
              --tag-specifications 'ResourceType=elastic-ip,Tags=[{Key=Name,Value=openhands-nat-eip}]' \
              --query 'AllocationId' --output text)

            NAT_GW_ID=$(aws ec2 create-nat-gateway \
              --region "$AWS_REGION" \
              --subnet-id "$PUBLIC_SUBNET_A" \
              --allocation-id "$EIP_ALLOC_ID" \
              --tag-specifications 'ResourceType=natgateway,Tags=[{Key=Name,Value=openhands-nat}]' \
              --query 'NatGateway.NatGatewayId' --output text)

            aws ec2 wait nat-gateway-available --region "$AWS_REGION" --nat-gateway-ids "$NAT_GW_ID"

            PRIVATE_RT=$(aws ec2 create-route-table \
              --region "$AWS_REGION" \
              --vpc-id "$VPC_ID" \
              --tag-specifications 'ResourceType=route-table,Tags=[{Key=Name,Value=openhands-private-rt}]' \
              --query 'RouteTable.RouteTableId' --output text)

            aws ec2 create-route --region "$AWS_REGION" --route-table-id "$PRIVATE_RT" --destination-cidr-block 0.0.0.0/0 --nat-gateway-id "$NAT_GW_ID"
            aws ec2 associate-route-table --region "$AWS_REGION" --route-table-id "$PRIVATE_RT" --subnet-id "$PRIVATE_SUBNET_A"
            aws ec2 associate-route-table --region "$AWS_REGION" --route-table-id "$PRIVATE_RT" --subnet-id "$PRIVATE_SUBNET_B"
          else
            echo "Reusing existing network resources from VPC: $VPC_ID"
            PUBLIC_SUBNET_A=$(get_subnet_id openhands-public-a)
            PUBLIC_SUBNET_B=$(get_subnet_id openhands-public-b)
            PRIVATE_SUBNET_A=$(get_subnet_id openhands-private-a)
            PRIVATE_SUBNET_B=$(get_subnet_id openhands-private-b)

            if is_empty_text "$PUBLIC_SUBNET_A" || is_empty_text "$PUBLIC_SUBNET_B" || is_empty_text "$PRIVATE_SUBNET_A" || is_empty_text "$PRIVATE_SUBNET_B"; then
              echo "Existing VPC found but required tagged subnets are missing"
              exit 1
            fi
          fi

          {
            echo "vpc_id=$VPC_ID"
            echo "public_subnet_a=$PUBLIC_SUBNET_A"
            echo "public_subnet_b=$PUBLIC_SUBNET_B"
            echo "private_subnet_a=$PRIVATE_SUBNET_A"
            echo "private_subnet_b=$PRIVATE_SUBNET_B"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve or create Route 53 hosted zone
        id: hosted_zone
        shell: bash
        run: |
          set -euo pipefail

          FORCE_DELETE='${{ inputs.force_delete }}'
          DOMAIN_WITH_DOT="${DOMAIN_NAME}."

          HOSTED_ZONES_JSON=$(aws route53 list-hosted-zones-by-name \
            --dns-name "$DOMAIN_WITH_DOT" \
            --output json)

          mapfile -t PUBLIC_HOSTED_ZONE_IDS < <(jq -r \
            --arg domain "$DOMAIN_WITH_DOT" \
            '.HostedZones[]
             | select(.Name == $domain and (.Config.PrivateZone | not))
             | .Id
             | ltrimstr("/hostedzone/")' <<< "$HOSTED_ZONES_JSON")

          if [[ "$FORCE_DELETE" == "true" && ${#PUBLIC_HOSTED_ZONE_IDS[@]} -gt 0 ]]; then
            echo "force_delete=true: deleting existing public hosted zone(s) for $DOMAIN_NAME"

            for zone_id in "${PUBLIC_HOSTED_ZONE_IDS[@]}"; do
              echo "Deleting hosted zone $zone_id"

              RECORDS_TO_DELETE=$(aws route53 list-resource-record-sets \
                --hosted-zone-id "$zone_id" \
                --query "ResourceRecordSets[?Type != 'NS' && Type != 'SOA']" \
                --output json)

              if [[ "$RECORDS_TO_DELETE" != "[]" ]]; then
                CHANGE_BATCH=$(jq -c '{Changes: map({Action: "DELETE", ResourceRecordSet: .})}' <<< "$RECORDS_TO_DELETE")
                aws route53 change-resource-record-sets \
                  --hosted-zone-id "$zone_id" \
                  --change-batch "$CHANGE_BATCH"
              fi

              aws route53 delete-hosted-zone --id "$zone_id"
            done

            PUBLIC_HOSTED_ZONE_IDS=()
          fi

          if [[ ${#PUBLIC_HOSTED_ZONE_IDS[@]} -gt 0 ]]; then
            HOSTED_ZONE_ID="${PUBLIC_HOSTED_ZONE_IDS[0]}"
            echo "Reusing existing public hosted zone: $HOSTED_ZONE_ID"
          else
            HOSTED_ZONE_ID=$(aws route53 create-hosted-zone \
              --name "$DOMAIN_NAME" \
              --caller-reference "openhands-${{ github.run_id }}-${{ github.run_attempt }}" \
              --hosted-zone-config Comment='OpenHands hosted zone',PrivateZone=false \
              --query 'HostedZone.Id' --output text)
            HOSTED_ZONE_ID="${HOSTED_ZONE_ID#/hostedzone/}"
            echo "Created new public hosted zone: $HOSTED_ZONE_ID"
          fi

          echo "hosted_zone_id=$HOSTED_ZONE_ID" >> "$GITHUB_OUTPUT"

      - name: Bootstrap CDK (main region)
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          APP_CMD="npx ts-node --prefer-ts-exts bin/openhands-infra.ts"

          npx cdk bootstrap "aws://${ACCOUNT_ID}/${AWS_REGION}" \
            --app "$APP_CMD" \
            --context "vpcId=${{ steps.network.outputs.vpc_id }}" \
            --context "hostedZoneId=${{ steps.hosted_zone.outputs.hosted_zone_id }}" \
            --context "domainName=${{ inputs.domain_name }}" \
            --context "subDomain=${{ inputs.sub_domain }}" \
            --context "region=${{ inputs.aws_region }}"

      - name: Bootstrap CDK (us-east-1 for Edge)
        shell: bash
        run: |
          set -euo pipefail

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          APP_CMD="npx ts-node --prefer-ts-exts bin/openhands-infra.ts"

          npx cdk bootstrap "aws://${ACCOUNT_ID}/us-east-1" \
            --app "$APP_CMD" \
            --context "vpcId=${{ steps.network.outputs.vpc_id }}" \
            --context "hostedZoneId=${{ steps.hosted_zone.outputs.hosted_zone_id }}" \
            --context "domainName=${{ inputs.domain_name }}" \
            --context "subDomain=${{ inputs.sub_domain }}" \
            --context "region=us-east-1"

      - name: Ensure sandbox secret exists
        shell: bash
        run: |
          set -euo pipefail

          if aws secretsmanager describe-secret --region "$AWS_REGION" --secret-id openhands/sandbox-secret-key >/dev/null 2>&1; then
            echo "Secret already exists in $AWS_REGION"
          else
            aws secretsmanager create-secret \
              --name openhands/sandbox-secret-key \
              --secret-string "$(openssl rand -base64 32)" \
              --region "$AWS_REGION" \
              --description "OpenHands sandbox secret key for session encryption"
          fi

      - name: Deploy CDK stacks
        shell: bash
        run: |
          set -euo pipefail

          CMD=(
            npx cdk deploy --all
            --context "vpcId=${{ steps.network.outputs.vpc_id }}"
            --context "hostedZoneId=${{ steps.hosted_zone.outputs.hosted_zone_id }}"
            --context "domainName=${{ inputs.domain_name }}"
            --context "subDomain=${{ inputs.sub_domain }}"
            --context "region=${{ inputs.aws_region }}"
            --context "authDomainPrefixSuffix=${{ inputs.auth_domain_prefix_suffix }}"
            --context "sandboxAwsAccess=${{ inputs.sandbox_aws_access }}"
            --context "sandboxAwsPolicyFile=${{ inputs.sandbox_aws_policy_file }}"
            --context "skipS3Endpoint=${{ inputs.skip_s3_endpoint }}"
            --context "warmPoolSize=${{ inputs.warm_pool_size }}"
            --context "idleTimeoutMinutes=${{ inputs.idle_timeout_minutes }}"
            --require-approval never
          )

          if [[ -n "${{ inputs.auth_callback_domains }}" ]]; then
            CMD+=(--context "authCallbackDomains=${{ inputs.auth_callback_domains }}")
          fi

          if [[ -n "${{ inputs.edge_stack_suffix }}" ]]; then
            CMD+=(--context "edgeStackSuffix=${{ inputs.edge_stack_suffix }}")
          fi

          if [[ -n "${{ inputs.sandbox_soci_image_uri }}" ]]; then
            CMD+=(--context "sandboxSociImageUri=${{ inputs.sandbox_soci_image_uri }}")
          fi

          "${CMD[@]}"

      - name: Deployment summary
        run: |
          echo "OpenHands URL: https://${{ inputs.sub_domain }}.${{ inputs.domain_name }}"
          echo "VPC ID: ${{ steps.network.outputs.vpc_id }}"
          echo "Hosted Zone ID: ${{ steps.hosted_zone.outputs.hosted_zone_id }}"
