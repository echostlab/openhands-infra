name: opencode

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  issue_comment:
    types:
      - created

  pull_request_review_comment:
    types:
      - created

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-trigger:
    runs-on: ubuntu-latest

    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      run_kind: ${{ steps.check.outputs.run_kind }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      model: ${{ steps.check.outputs.model }}
      provider: ${{ steps.check.outputs.provider }}
      agent: ${{ steps.check.outputs.agent }}
      variant: ${{ steps.check.outputs.variant }}
      share: ${{ steps.check.outputs.share }}
      session_metadata: ${{ steps.check.outputs.session_metadata }}

    steps:
      - id: check
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association || '' }}

          TRUSTED_AUTHOR_ASSOCIATIONS: OWNER,MEMBER,COLLABORATOR
          ALLOWED_AGENT_OVERRIDES: build,plan,reviewer
          ALLOWED_VARIANT_OVERRIDES: default
          ALLOWED_MODEL_OVERRIDES: gpt-5.3-codex,gpt-5.4-pro

          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}

          HAS_PR:
            ${{ github.event.pull_request.number != null || github.event.issue.pull_request != null }}

        run: |
          set -euo pipefail

          resolve_model() {
            local input="${1:-gpt-5.4-pro}"
            local normalized=""

            normalized="${input##azure-foundry/}"
            if [[ -z "$normalized" ]]; then
              fail_invalid_flag "model" "missing value"
            fi

            if ! csv_contains "$ALLOWED_MODEL_OVERRIDES" "$normalized"; then
              fail_invalid_flag "model" "value '$input' is not allowlisted (allowed: ${ALLOWED_MODEL_OVERRIDES})"
            fi

            echo "azure-foundry/$normalized"
          }

          extract_provider() {
            echo "${1%%/*}"
          }

          extract_flag() {
            local key="$1"
            echo "$COMMENT_BODY" | grep -oiP "${key}=\K\S+" | head -1 || true
          }

          has_flag() {
            local key="$1"
            echo "$COMMENT_BODY" | grep -qiE "(^|[[:space:]])${key}="
          }

          csv_contains() {
            local csv_list="$1"
            local probe="$2"
            local normalized_probe="${probe//[[:space:]]/}"
            local candidate=""

            normalized_probe="${normalized_probe,,}"

            IFS=',' read -r -a _items <<< "$csv_list"
            for candidate in "${_items[@]}"; do
              candidate="${candidate//[[:space:]]/}"
              candidate="${candidate,,}"
              if [[ "$candidate" == "$normalized_probe" ]]; then
                return 0
              fi
            done

            return 1
          }

          is_trusted_comment_author() {
            local association="${COMMENT_AUTHOR_ASSOCIATION^^}"
            csv_contains "$TRUSTED_AUTHOR_ASSOCIATIONS" "$association"
          }

          fail_invalid_flag() {
            local key="$1"
            local reason="$2"
            echo "::error::Invalid /oc flag '${key}=': ${reason}"
            exit 1
          }

          require_non_empty_flag_value() {
            local key="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              fail_invalid_flag "$key" "missing value"
            fi
          }

          validate_agent() {
            local input="${1:-}"
            local normalized="${input,,}"

            if [[ ! "$normalized" =~ ^[a-z0-9][a-z0-9_-]{0,63}$ ]]; then
              fail_invalid_flag "agent" "value '$input' has invalid format"
            fi

            if ! is_trusted_comment_author; then
              fail_invalid_flag "agent" "override requires trusted author association (${TRUSTED_AUTHOR_ASSOCIATIONS}), got '${COMMENT_AUTHOR_ASSOCIATION:-NONE}'"
            fi

            if ! csv_contains "$ALLOWED_AGENT_OVERRIDES" "$normalized"; then
              fail_invalid_flag "agent" "value '$input' is not allowlisted for this repo (allowed: ${ALLOWED_AGENT_OVERRIDES})"
            fi

            echo "$normalized"
          }

          validate_variant() {
            local input="${1:-}"
            local normalized="${input,,}"

            # Repo policy: variant overrides are explicit-allowlist only.
            # Keep ALLOWED_VARIANT_OVERRIDES in sync with supported variants.
            if ! csv_contains "$ALLOWED_VARIANT_OVERRIDES" "$normalized"; then
              fail_invalid_flag "variant" "value '$input' is not allowlisted (allowed: ${ALLOWED_VARIANT_OVERRIDES})"
            fi

            echo "$normalized"
          }

          validate_share() {
            local input="${1:-}"
            local normalized="${input,,}"

            case "$normalized" in
              auto|manual|disabled)
                echo "$normalized"
                ;;
              *)
                fail_invalid_flag "share" "value '$input' must be one of: auto, manual, disabled"
                ;;
            esac
          }

          validate_session() {
            local input="${1:-}"
            local normalized="$input"

            if [[ ! "$normalized" =~ ^[A-Za-z0-9][A-Za-z0-9._:-]{0,63}$ ]]; then
              fail_invalid_flag "session" "value '$input' has invalid format"
            fi

            echo "$normalized"
          }

          SHOULD_RUN="false"
          RUN_KIND="none"

          FULL_MODEL="$(resolve_model "gpt-5.4-pro")"
          SELECTED_AGENT=""
          SELECTED_VARIANT=""
          SELECTED_SHARE=""
          SESSION_METADATA=""

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            SHOULD_RUN="true"
            RUN_KIND="auto_pr_review"

          elif [[ "$EVENT_NAME" == "issue_comment" || "$EVENT_NAME" == "pull_request_review_comment" ]]; then

            if echo "$COMMENT_BODY" | grep -qiE '(^|[[:space:]])/(oc|opencode)\b'; then

              if has_flag "model"; then
                RAW_MODEL="$(extract_flag "model")"
                require_non_empty_flag_value "model" "$RAW_MODEL"
                FULL_MODEL="$(resolve_model "$RAW_MODEL")"
              fi

              if has_flag "agent"; then
                RAW_AGENT="$(extract_flag "agent")"
                require_non_empty_flag_value "agent" "$RAW_AGENT"
                SELECTED_AGENT="$(validate_agent "$RAW_AGENT")"
              fi

              if has_flag "variant"; then
                RAW_VARIANT="$(extract_flag "variant")"
                require_non_empty_flag_value "variant" "$RAW_VARIANT"
                SELECTED_VARIANT="$(validate_variant "$RAW_VARIANT")"
              fi

              if has_flag "share"; then
                RAW_SHARE="$(extract_flag "share")"
                require_non_empty_flag_value "share" "$RAW_SHARE"
                SELECTED_SHARE="$(validate_share "$RAW_SHARE")"
              fi

              if has_flag "session"; then
                RAW_SESSION="$(extract_flag "session")"
                require_non_empty_flag_value "session" "$RAW_SESSION"
                VALID_SESSION="$(validate_session "$RAW_SESSION")"
                SESSION_METADATA="session=$VALID_SESSION"
              fi

              if [[ "$HAS_PR" == "true" ]]; then
                SHOULD_RUN="true"
                RUN_KIND="manual_pr_review"
              else
                SHOULD_RUN="true"
                RUN_KIND="issue_task"
              fi
            fi
          fi

          {
            echo "should_run=$SHOULD_RUN"
            echo "run_kind=$RUN_KIND"
            echo "pr_number=$PR_NUMBER"
            echo "issue_number=$ISSUE_NUMBER"
            echo "model=$FULL_MODEL"
            echo "provider=$(extract_provider "$FULL_MODEL")"
            echo "agent=$SELECTED_AGENT"
            echo "variant=$SELECTED_VARIANT"
            echo "share=$SELECTED_SHARE"
            echo "session_metadata=$SESSION_METADATA"
          } >> "$GITHUB_OUTPUT"

  opencode:
    needs: detect-trigger

    if: needs.detect-trigger.outputs.should_run == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      deployments: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Install repo dependencies (optional)
        run: sudo npm install -g --no-audit --no-fund 

      - name: Set Azure OpenAI env vars
        shell: bash
        run: |
          {
            echo "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_API_KEY }}"
            echo "AZURE_API_KEY=${{ secrets.AZURE_API_KEY }}"
          } >> "$GITHUB_ENV"

      - name: Compose OpenCode prompt
        id: compose
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXECUTION_METADATA: ${{ needs.detect-trigger.outputs.session_metadata }}

          COMMENT_BODY: ${{ github.event.comment.body || '' }}

          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}

          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}

        run: |
          set -euo pipefail

          DELIM="OPENCODE_PROMPT_EOF_$(date +%s%N)"

          {
            echo "prompt<<$DELIM"

            echo "CONTEXTO:"
            echo "event_name=${EVENT_NAME}"
            echo ""

            if [[ -n "${EXECUTION_METADATA:-}" ]]; then
              echo "execution_metadata: ${EXECUTION_METADATA}"
              echo ""
            fi

            if [[ -n "$COMMENT_BODY" ]]; then
              echo "=== COMENTARIO ==="
              echo "$COMMENT_BODY"
              echo ""
            fi

            if [[ -n "$ISSUE_TITLE" || -n "$ISSUE_BODY" ]]; then
              echo "=== ISSUE ==="
              echo "title: $ISSUE_TITLE"
              echo "body:"
              echo "$ISSUE_BODY"
              echo ""
            fi

            if [[ -n "$PR_TITLE" || -n "$PR_BODY" ]]; then
              echo "=== PULL REQUEST ==="
              echo "title: $PR_TITLE"
              echo "body:"
              echo "$PR_BODY"
              echo ""
            fi

            echo "$DELIM"

          } >> "$GITHUB_OUTPUT"

      - name: Install OCX
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL https://ocx.kdco.dev/install.sh | sh

          mkdir -p ~/.config
        
      - name: Export vars
        run: |
          CURRENT_DIR="$(pwd)"
          CONFIG_FILE="$CURRENT_DIR/.opencode/opencode.json"

          if [ ! -f "$CONFIG_FILE" ]; then
             echo "Config file not found: $CONFIG_FILE"
             exit 1
          fi

           echo "OPENCODE_CONFIG=$CONFIG_FILE" >> "$GITHUB_ENV"
           echo "OPENCODE_CONFIG_DIR=$CURRENT_DIR/.opencode" >> "$GITHUB_ENV"
           echo "OPENCODE_MODEL=${{ needs.detect-trigger.outputs.model }}" >> "$GITHUB_ENV"
           echo "OPENCODE_SMALL_MODEL=azure-foundry/gpt-5.3-codex" >> "$GITHUB_ENV"
    
      - name: Run OpenCode Review
        uses: sst/opencode/github@latest
        env:
          AZURE_OPENAI_API_KEY: ${{ env.AZURE_OPENAI_API_KEY }}
          OPENCODE_CONFIG: ${{ env.OPENCODE_CONFIG }}
          OPENCODE_CONFIG_DIR: ${{ env.OPENCODE_CONFIG_DIR }}
          OPENCODE_MODEL: ${{ env.OPENCODE_MODEL }}
          OPENCODE_SMALL_MODEL: ${{ env.OPENCODE_SMALL_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_RESOURCE_NAME: "openslab-resource"
        with:
          model: ${{ needs.detect-trigger.outputs.model }}
          agent: ${{ needs.detect-trigger.outputs.agent != '' && needs.detect-trigger.outputs.agent || null }}
          variant: ${{ needs.detect-trigger.outputs.variant != '' && needs.detect-trigger.outputs.variant || null }}
          share: ${{ needs.detect-trigger.outputs.share != '' && needs.detect-trigger.outputs.share || null }}
          prompt: ${{ steps.compose.outputs.prompt }}

      - name: Report failure
        if: failure()

        uses: actions/github-script@v7

        env:
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issueNumber =
              process.env.RUN_KIND === 'issue_task'
                ? Number(process.env.ISSUE_NUMBER)
                : Number(process.env.PR_NUMBER);

            const body =
              process.env.RUN_KIND === 'issue_task'
                ? `đź¤– Task failed.\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                : `đź¤– Review failed.\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
